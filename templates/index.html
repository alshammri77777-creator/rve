<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدوات تيك توك</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: #1e1e1e;
            color: #ddd;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .icon-box { font-size: 40px; margin-bottom: 15px; color: #00f2ea; }
        h3 { margin-bottom: 20px; font-size: 18px; color: #fff; }
        input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #3a3a3a;
            color: white;
            box-sizing: border-box;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #ff0050;
            color: white;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:hover { background: #d60045; }
        .btn-blue { background: #00f2ea; color: #000; }
        .btn-blue:hover { background: #00d1ca; }
        .divider {
            height: 1px;
            background: #444;
            margin: 20px 0;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
            font-weight: bold;
        }
        .error { color: #ff4d4d; }
        .success { color: #00ff88; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-box"><i class="fab fa-tiktok"></i></div>
    <h3>أدوات تيك توك المتكاملة</h3>

    <input type="text" id="url" placeholder="الصق الرابط هنا...">

    <button class="btn" onclick="handleAction('download')">
        <i class="fa-solid fa-download"></i> تحميل بدون علامة مائية
    </button>

    <div class="divider"></div>
    <p style="font-size: 13px; margin-bottom: 10px;">أدوات الرشق</p>

    <div style="display: flex; gap: 10px;">
        <button class="btn btn-blue" onclick="handleAction('views')">
            <i class="fa-solid fa-eye"></i> مشاهدات
        </button>
        <button class="btn btn-blue" onclick="handleAction('likes')">
            <i class="fa-solid fa-heart"></i> لايكات
        </button>
    </div>

    <div id="status"></div>
</div>

<script>
async function handleAction(type) {
    const url = document.getElementById("url").value;
    const status = document.getElementById("status");
    
    if (!url) {
        status.innerHTML = '<span class="error">الرجاء وضع الرابط أولاً!</span>';
        return;
    }

    status.className = "";
    status.innerText = "جاري المعالجة... انتظر قليلاً";

    try {
        const response = await fetch("/process", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({url: url, action: type})
        });

        const data = await response.json();

        if (data.success) {
            status.innerHTML = `<span class="success">${data.message}</span>`;
            if (type === 'download') {
                window.location.href = "/get/" + data.file;
            }
        } else {
            status.innerHTML = '<span class="error">يرجى المحاولة مرة أخرى</span>';
        }

    } catch (error) {
        status.innerHTML = '<span class="error">حدث خطأ في الاتصال</span>';
    }
}
</script>

</body>
</html>
